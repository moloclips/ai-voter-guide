<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Voter Guide - 2026 Midterms</title>
<style>
    :root {
      --page: #f4f1eb;
      --card: #fbfaf7;
      --ink: #20262d;
      --muted: #5d6771;
      --line: #d8d2c7;
      --accent: #295a73;
      --accent-soft: #e7eef2;
      --accent-faint: #f2f6f8;
      --heading: #16212a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, "Times New Roman", serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0) 220px),
        linear-gradient(135deg, #f5f1ea 0%, var(--page) 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(20, 26, 30, 0.06);
    }

    .panel-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      letter-spacing: -0.03em;
      color: var(--heading);
    }

    .subhead {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.55;
    }

    .subhead-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin: 0 0 0;
      padding: 0;
    }

    .meta-row {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px 18px;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .meta-label {
      font-weight: 700;
      color: var(--heading);
    }

    .controls {
      display: grid;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--heading);
    }

    .search-row {
      position: relative;
    }

    input[type="text"] {
      width: 100%;
      min-width: 220px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      font-family: inherit;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.92rem;
      cursor: pointer;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      width: fit-content;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--accent-faint);
    }

    .status {
      min-height: 1.5em;
      color: var(--muted);
      margin: 0;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(20, 26, 30, 0.12);
      max-height: 300px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .suggestions.show {
      display: block;
    }

    .dropdown-inner {
      padding: 8px;
    }

    .dropdown-filter {
      width: 100%;
      margin-bottom: 8px;
    }

    .state-list {
      max-height: 240px;
      overflow-y: auto;
    }

    .suggestion {
      width: 100%;
      text-align: left;
      background: #fff;
      color: var(--ink);
      border: 0;
      border-bottom: 1px solid #ece6da;
      border-radius: 0;
      padding: 10px 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .suggestion:last-child {
      border-bottom: 0;
    }

    .suggestion:hover,
    .suggestion:focus {
      background: var(--accent-soft);
      outline: none;
    }

    .race-results {
      margin-top: 10px;
      display: grid;
      gap: 14px;
    }

    .office-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
    }

    .office-title {
      margin: 0 0 10px;
      font-size: 1.02rem;
      color: var(--heading);
    }

    .candidate-list {
      margin: 4px 0 0 18px;
      padding: 0;
    }

    .race-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }

    .race-table th,
    .race-table td {
      border: 1px solid var(--line);
      padding: 9px 11px;
      text-align: left;
      vertical-align: top;
    }

    .race-table th {
      background: #f3efe7;
      font-weight: 700;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--heading);
    }

    .state-section {
      margin-top: 32px;
    }

    .state-header {
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 5;
      margin: 0 0 12px;
      padding: 10px 0 8px;
      border-bottom: 2px solid var(--line);
      font-size: 1.3rem;
      letter-spacing: -0.01em;
      color: var(--heading);
    }

    .evidence-list {
      display: grid;
      gap: 6px;
    }

    .evidence-link {
      display: block;
      padding: 0;
      border: 0;
      background: none;
      font-size: 0.86rem;
      line-height: 1.4;
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: rgba(41, 90, 115, 0.35);
      text-underline-offset: 2px;
    }

    .evidence-link:hover {
      text-decoration-color: currentColor;
    }

    .evidence-domain {
      display: block;
      margin-left: 20px;
      margin-top: 2px;
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.74rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.01em;
    }

    .evidence-index {
      font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 0.77rem;
      font-weight: 700;
      color: var(--muted);
      margin-right: 6px;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .panel {
        padding: 16px;
        border-radius: 14px;
      }

      .panel-top {
        flex-direction: column;
      }

    }
  </style>
</head>

<main class="wrap">
<section class="panel">
<div class="panel-top">
<div>
<h1>AI Voter Guide (2026 Midterms)</h1>
</div>
<a class="btn" href="?all" id="modeToggleBtn">See all</a>

<div class="subhead-row">
<p class="subhead">

      </p>
<div class="meta-row">
<span><span class="meta-label">Last updated:</span> <time id="lastUpdated">Pending build</time></span>
</div>
</div>
<div class="controls">
<label for="stateSearch">Find your state</label>
<div class="search-row">
<input autocomplete="off" id="stateSearch" placeholder="Select a state" readonly="" type="text"/>
<div aria-label="State suggestions" class="suggestions" id="suggestions" role="listbox">
<div class="dropdown-inner">
<input autocomplete="off" class="dropdown-filter" id="stateFilter" placeholder="Search states..." type="text"/>
<div class="state-list" id="stateList"></div>
</div>
</div>
</div>
<button class="btn" id="detectStateBtn" type="button">Use My Location</button>
<p class="status" id="status">No state selected yet.</p>
<div class="race-results" id="raceResults"></div>
</div>
</section>
</main>

<script>
    const VERDICT_META = {
      nice:      { label: "✓ Supports Safety", bg: "#E2EFDA", color: "#1F6B2E", border: "#a8d5a2" },
      nuanced:   { label: "~ Mixed Record",    bg: "#FFF2CC", color: "#7B5A00", border: "#f0d080" },
      no_record: { label: "– No Record",       bg: "#F2F2F2", color: "#444",    border: "#ccc"    },
      naughty:   { label: "✗ Opposes Safety",  bg: "#FCE4E4", color: "#7B1414", border: "#f0a0a0" },
    };
    const VERDICT_ORDER = ["nice","nuanced","no_record","naughty"];

    const states = [
      { name: "Alabama", abbr: "AL" }, { name: "Alaska", abbr: "AK" },
      { name: "Arizona", abbr: "AZ" }, { name: "Arkansas", abbr: "AR" },
      { name: "California", abbr: "CA" }, { name: "Colorado", abbr: "CO" },
      { name: "Connecticut", abbr: "CT" }, { name: "Delaware", abbr: "DE" },
      { name: "Florida", abbr: "FL" }, { name: "Georgia", abbr: "GA" },
      { name: "Hawaii", abbr: "HI" }, { name: "Idaho", abbr: "ID" },
      { name: "Illinois", abbr: "IL" }, { name: "Indiana", abbr: "IN" },
      { name: "Iowa", abbr: "IA" }, { name: "Kansas", abbr: "KS" },
      { name: "Kentucky", abbr: "KY" }, { name: "Louisiana", abbr: "LA" },
      { name: "Maine", abbr: "ME" }, { name: "Maryland", abbr: "MD" },
      { name: "Massachusetts", abbr: "MA" }, { name: "Michigan", abbr: "MI" },
      { name: "Minnesota", abbr: "MN" }, { name: "Mississippi", abbr: "MS" },
      { name: "Missouri", abbr: "MO" }, { name: "Montana", abbr: "MT" },
      { name: "Nebraska", abbr: "NE" }, { name: "Nevada", abbr: "NV" },
      { name: "New Hampshire", abbr: "NH" }, { name: "New Jersey", abbr: "NJ" },
      { name: "New Mexico", abbr: "NM" }, { name: "New York", abbr: "NY" },
      { name: "North Carolina", abbr: "NC" }, { name: "North Dakota", abbr: "ND" },
      { name: "Ohio", abbr: "OH" }, { name: "Oklahoma", abbr: "OK" },
      { name: "Oregon", abbr: "OR" }, { name: "Pennsylvania", abbr: "PA" },
      { name: "Rhode Island", abbr: "RI" }, { name: "South Carolina", abbr: "SC" },
      { name: "South Dakota", abbr: "SD" }, { name: "Tennessee", abbr: "TN" },
      { name: "Texas", abbr: "TX" }, { name: "Utah", abbr: "UT" },
      { name: "Vermont", abbr: "VT" }, { name: "Virginia", abbr: "VA" },
      { name: "Washington", abbr: "WA" }, { name: "West Virginia", abbr: "WV" },
      { name: "Wisconsin", abbr: "WI" }, { name: "Wyoming", abbr: "WY" }
    ].sort((a, b) => a.name.localeCompare(b.name));

    const statusEl   = document.getElementById("status");
    const search     = document.getElementById("stateSearch");
    const modeToggleBtn = document.getElementById("modeToggleBtn");
    const stateFilter = document.getElementById("stateFilter");
    const stateList  = document.getElementById("stateList");
    const detectBtn  = document.getElementById("detectStateBtn");
    const suggestions = document.getElementById("suggestions");
    const raceResults = document.getElementById("raceResults");

    function normalize(s) { return s.trim().toLowerCase(); }

    function getMatches(input) {
      const k = normalize(input);
      if (!k) return states;
      return states.filter(s => normalize(s.name).includes(k) || normalize(s.abbr).startsWith(k));
    }

    function renderStateList(input) {
      const matches = getMatches(input);
      stateList.innerHTML = matches.length
        ? matches.map(s => `<button class="suggestion" type="button" data-state="${s.name}">${s.name} (${s.abbr})</button>`).join("")
        : '<p class="status">No matching states.</p>';
    }

    function openStateDropdown() {
      suggestions.classList.add("show");
      stateFilter.value = "";
      renderStateList("");
      stateFilter.focus();
    }

    function findState(input) {
      const k = normalize(input);
      return states.find(s => normalize(s.name) === k || normalize(s.abbr) === k) || null;
    }

    function verdictBadge(verdict) {
      const m = VERDICT_META[verdict] || VERDICT_META.no_record;
      return `<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.78rem;font-weight:700;background:${m.bg};color:${m.color};border:1px solid ${m.border}">${m.label}</span>`;
    }

    function renderEvidence(evidence) {
      if (!evidence || !evidence.length) return '<span style="color:var(--muted);font-size:0.85rem">—</span>';
      return `<div class="evidence-list">` + evidence.map((e, i) => {
        const url = typeof e === "string" ? e : (e?.url || "");
        const rawLabel = typeof e === "string" ? e : (e?.description || e?.url || "");
        const label = String(rawLabel);
        let domain = "";
        try {
          domain = new URL(url).hostname.replace(/^www\./, "");
        } catch {}
        return `<div><a class="evidence-link" href="${url}" target="_blank" rel="noopener noreferrer"
            title="${label.replace(/"/g,'&quot;')}"
            ><span class="evidence-index">[${i+1}]</span>${label}</a>${domain ? `<span class="evidence-domain">${domain}</span>` : ""}</div>`;
      }).join("") + `</div>`;
    }

    const VOTER_DATA = JSON.parse(document.getElementById("voter-data").textContent);

    function getCandidatesForState(stateName) {
      const data = VOTER_DATA;
      if (Array.isArray(data)) {
        const out = [];
        data.filter(r => r.state === stateName).forEach(r => {
          r.candidates.forEach(c => out.push({ ...c, office: r.office, state: r.state }));
        });
        return out;
      }

      const out = [];
      const ai = data?.aiResearch || {};
      const pushOffice = (office, officeData) => {
        const stateParties = officeData?.[stateName];
        if (!stateParties || typeof stateParties !== "object") return;
        for (const [party, names] of Object.entries(stateParties)) {
          if (!Array.isArray(names)) continue;
          for (const candidate of names) {
            const record = ai[candidate];
            const links = Array.isArray(record?.links) ? record.links : [];
            out.push({
              state: stateName,
              office,
              candidate,
              party,
              status: "",
              verdict: "no_record",
              evidence: links.map((url) => ({ url, description: url }))
            });
          }
        }
      };

      pushOffice("Governor", data?.governors);
      pushOffice("Senate", data?.senate);
      return out;
    }

    function getRenderableStateNames() {
      const data = VOTER_DATA;
      if (Array.isArray(data)) {
        return [...new Set(data.map(c => c.state))];
      }
      const names = new Set([
        ...Object.keys(data?.governors || {}),
        ...Object.keys(data?.senate || {})
      ]);
      return [...names];
    }

    function buildStateRacesHTML(stateName) {
      const candidates = getCandidatesForState(stateName);
      if (!candidates.length) {
        return '<p class="status">No race data available for this state yet.</p>';
      }

      const byOffice = {};
      candidates.forEach(c => {
        (byOffice[c.office] = byOffice[c.office] || []).push(c);
      });

      const officeOrder = ["Senate", "Governor"];
      return officeOrder
        .filter(o => byOffice[o])
        .map(office => {
          const sorted = [...byOffice[office]].sort((a, b) =>
            VERDICT_ORDER.indexOf(a.verdict) - VERDICT_ORDER.indexOf(b.verdict)
          );
          const rows = sorted.map(c => `
            <tr>
              <td><strong>${c.candidate}</strong></td>
              <td style="text-align:center">${c.party}</td>
              <td style="text-align:center">${verdictBadge(c.verdict)}</td>
              <td>${renderEvidence(c.sources)}</td>
            </tr>`).join("");
          return `
            <article class="office-block">
              <h3 class="office-title">${office === "Senate" ? "U.S. Senate" : office}</h3>
              <table class="race-table">
                <thead>
                  <tr>
                    <th>Candidate</th><th>Party</th><th>AI Verdict</th><th>Evidence</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </article>`;
        }).join("");
    }

    function renderStateRaces(stateName) {
      raceResults.innerHTML = buildStateRacesHTML(stateName);
    }

    function selectState(name) {
      const found = findState(name);
      if (!found) { statusEl.textContent = "State not found."; raceResults.innerHTML = ""; return; }
      search.value = found.name;
      statusEl.textContent = `Selected: ${found.name} (${found.abbr}).`;
      suggestions.classList.remove("show");
      renderStateRaces(found.name);
    }

    function jsonp(url, timeoutMs = 12000) {
      return new Promise((resolve, reject) => {
        const cbName = `__vg_cb_${Date.now()}_${Math.floor(Math.random() * 1e6)}`;
        const script = document.createElement("script");
        let settled = false;
        const timer = setTimeout(() => { cleanup(); reject(new Error("Request timeout")); }, timeoutMs);
        function cleanup() {
          clearTimeout(timer);
          if (script.parentNode) script.parentNode.removeChild(script);
          try { delete window[cbName]; } catch { window[cbName] = undefined; }
          try { delete window.callback; } catch { window.callback = undefined; }
        }
        const onPayload = (payload) => { if (settled) return; settled = true; cleanup(); resolve(payload); };
        window[cbName] = onPayload; window.callback = onPayload;
        script.onerror = () => { cleanup(); reject(new Error("Network error")); };
        const sep = url.includes("?") ? "&" : "?";
        script.src = `${url}${sep}format=jsonp&callback=${cbName}`;
        document.body.appendChild(script);
      });
    }

    async function detectStateFromLocation() {
      if (!navigator.geolocation) { statusEl.textContent = "Geolocation not supported."; return; }
      statusEl.textContent = "Detecting your location…";
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          try {
            const { latitude, longitude } = position.coords;
            const data = await jsonp(`https://geo.fcc.gov/api/census/area?lat=${encodeURIComponent(latitude)}&lon=${encodeURIComponent(longitude)}`);
            const code = String(data?.results?.[0]?.state_code || "").toUpperCase();
            if (!code) throw new Error("State lookup failed.");
            const s = states.find(s => s.abbr === code);
            if (!s) throw new Error(`Unsupported state: ${code}`);
            selectState(s.name);
          } catch (err) { statusEl.textContent = `Location detected, but state lookup failed: ${err.message}`; }
        },
        (err) => { statusEl.textContent = `Location permission not granted (${err.message}).`; }
      );
    }

    search.addEventListener("focus", openStateDropdown);
    search.addEventListener("click", openStateDropdown);
    stateFilter.addEventListener("input", () => renderStateList(stateFilter.value));
    stateFilter.addEventListener("keydown", e => {
      if (e.key === "Escape") suggestions.classList.remove("show");
      if (e.key === "Enter") {
        const first = stateList.querySelector(".suggestion");
        if (first) { e.preventDefault(); selectState(first.dataset.state || ""); }
      }
    });
    stateList.addEventListener("click", e => {
      const btn = e.target.closest(".suggestion");
      if (btn) selectState(btn.dataset.state || "");
    });
    detectBtn.addEventListener("click", detectStateFromLocation);
    document.addEventListener("click", e => {
      if (!e.target.closest(".search-row")) suggestions.classList.remove("show");
    });

    const isAllMode = new URLSearchParams(location.search).has("all");
    if (modeToggleBtn) {
      modeToggleBtn.textContent = isAllMode ? "Search State" : "See all";
      modeToggleBtn.setAttribute("href", isAllMode ? location.pathname : "?all");
    }

    // ?all mode — render every tracked state at once
    if (isAllMode) {
      // raceResults lives inside .controls, so hide only the individual controls above it
      ["label[for='stateSearch']", ".search-row", "#detectStateBtn", "#status"].forEach(sel => {
        const el = document.querySelector(sel);
        if (el) el.style.display = "none";
      });
      const stateNames = getRenderableStateNames();
      raceResults.innerHTML =
        stateNames.map(name => `
          <section class="state-section">
            <h2 class="state-header">${name}</h2>
            <div class="race-results">${buildStateRacesHTML(name)}</div>
          </section>`).join("");
      raceResults.style.display = "block";
    }
  </script>
</body>
</html>
